name: verhuurapp
description: "Een app om huishoudelijke toestellen te delen en te verhuren."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

  # Google Maps
  google_maps_flutter: ^2.5.0
  google_maps_flutter_web: ^0.5.0

  # Locatie
  geolocator: ^11.0.0

  # Afbeeldingen
  image_picker: ^1.0.0

  # State management
  provider: ^6.1.0

  # Datum
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true